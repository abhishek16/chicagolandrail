name = "metra-proxy"
main = "src/index.js"
compatibility_date = "2026-06-01"

# 1) Create KV:  npx wrangler kv namespace create GTFS   → paste id below
[[kv_namespaces]]
binding = "GTFS"
id = "6cf1b8248edd4bee82fb8b77065610b1"

[vars]
# Set to your GitHub Pages origin to lock CORS (recommended before launch).
# Examples: "https://abhishek16.github.io"  (user site or project site share this origin)
# Leave "*" while testing.
ALLOWED_ORIGIN = "https://abhishek16.github.io"

# Web Push (background alerts). Public VAPID key + contact are public; the
# private key is a secret:  npx wrangler secret put VAPID_PRIVATE_JWK
VAPID_PUBLIC = "BHMlUTF-D-kjj9yMfm6dSNmWVI3hvU1MFpHCZDWIMTRQeOktlRak5tpHFxe8dj4072NIXweOUgR6201Z5OSDwyg"
VAPID_SUBJECT = "mailto:resoluteacc@gmail.com"

# Background push cron — every 15 min (~96 runs/day, well within free limits).
[triggers]
crons = ["*/15 * * * *"]

# 2) Metra key as a secret:  npx wrangler secret put METRA_API_KEY
# 3) VAPID private key secret:  npx wrangler secret put VAPID_PRIVATE_JWK
